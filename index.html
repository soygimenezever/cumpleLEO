<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Cumpleaños Leo Messi</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background-color: #000; color: white; font-family: sans-serif; }
        #container { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        #main-bg {
            background-image: url('messi.png');
            background-size: contain; 
            background-position: center;
            background-repeat: no-repeat;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }
        #vimeo-container {
            display: none; 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            overflow: hidden; /* Esto asegura que el video no se salga del contenedor */
        }

        /* Asegura que el iframe dentro llene todo el espacio */
        #vimeo-container iframe {
            width: 100%;
            height: 100%;
            pointer-events: none; /* Opcional: si no quieres que el usuario interactúe con el iframe directamente */
        }
        #timer-box { 
            z-index: 10; 
            background: rgba(0,0,0,0.5); 
            padding: 20px; 
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>

    <div id="main-bg"></div>

    <div id="container">
        <div id="timer-box">
            <h1>¡Falta poco para saludar a Messi!</h1>
            <div id="timer" style="font-size: 3rem; font-weight: bold;">Cargando...</div>
        </div>

        <div id="vimeo-container">
            <iframe src="https://player.vimeo.com/video/1204602512?badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479&amp;autoplay=1&amp;loop=1&amp;&controls=0" frameborder="0" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" referrerpolicy="strict-origin-when-cross-origin" style="position:absolute;top:0;left:0;width:100%;height:100%;" title="cumpleLEO"></iframe>
        </div>
        <script src="https://player.vimeo.com/api/player.js"></script>
    </div>

    <script>
        // --- CONFIGURACIÓN DE PRUEBA ---
        // Cambia 'modoPrueba' a false cuando ya quieras usar el tiempo real del sistema.
        const modoPrueba = false; 
        const fechaBase = new Date("2026-06-24T09:59:55").getTime();
        let segundosTranscurridos = 0;
        let vimeoPlayer;

        document.addEventListener("DOMContentLoaded", function() {
            const iframeElement = document.querySelector('iframe');
            vimeoPlayer = new Vimeo.Player(iframeElement);
        });

        function actualizarPagina() {
            if (!vimeoPlayer) return;
            // Si es modo prueba, el tiempo avanza 1 segundo por cada tick
            const now = modoPrueba ? new Date(fechaBase + (segundosTranscurridos * 1000)) : new Date();
            if (modoPrueba) segundosTranscurridos++;

            const currentYear = now.getFullYear();
            const nowTime = now.getTime();

            const timerBox = document.getElementById("timer-box");
            const mainBg = document.getElementById("main-bg");

            const startDate = new Date(currentYear, 5, 24, 10, 0, 0).getTime();
            const endDate = new Date(currentYear, 5, 24, 23, 59, 59).getTime();

            const vimeoContainer = document.getElementById("vimeo-container");

            if (nowTime >= startDate && nowTime <= endDate) {
                timerBox.style.display = "none";
                mainBg.style.display = "none";
                vimeoContainer.style.display = "block";

                vimeoPlayer.play().catch(e => console.log("Esperando interacción..."));
            } else {
                timerBox.style.display = "flex";
                mainBg.style.display = "block";
                vimeoContainer.style.display = "none";
                vimeoPlayer.pause();

                let target = new Date(currentYear, 5, 24, 10, 0, 0).getTime();
                if (nowTime > target) {
                    target = new Date(currentYear + 1, 5, 24, 10, 0, 0).getTime();
                }

                const distance = target - nowTime;
                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById("timer").innerHTML = days + "d " + hours + "h " + minutes + "m " + seconds + "s ";
            }
        }

        setInterval(actualizarPagina, 1000);
        actualizarPagina();

        document.body.addEventListener('click', function() {
            // Usamos el mismo objeto vimeoPlayer que creamos antes
            if (vimeoPlayer) {
                vimeoPlayer.setVolume(1); // Esto activa el sonido (va de 0 a 1)
            }
        }, { once: true });
    </script>
</body>
</html>
